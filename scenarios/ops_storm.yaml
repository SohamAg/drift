  - { timestep: 5,  name: PartialOutage }
  - { timestep: 8,  name: DependentServiceDown }
  - { timestep: 11, name: CustomerNoise }
  - { timestep: 15, name: SeveritySpike }
  - { timestep: 18, name: CustomerNoise }
  - { timestep: 22, name: PartialOutage }
  - { timestep: 26, name: DependentServiceDown }
  - { timestep: 32, name: SeveritySpike }
  - { timestep: 38, name: CustomerNoise }

