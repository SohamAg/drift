name: policy_chaos

# Stress-tests policy_inconsistency + sentiment_collapse: many policy
# changes in a short window means refund agents constantly cite stale
# versions, while angry-customer surges drag sentiment down.
scripted:
  - { timestep: 2,  name: RefundPolicyChange }
  - { timestep: 4,  name: AngryCustomerSurge }
  - { timestep: 7,  name: RefundPolicyChange }
  - { timestep: 10, name: RefundPolicyChange }
  - { timestep: 13, name: AngryCustomerSurge }
  - { timestep: 16, name: RefundPolicyChange }
  - { timestep: 21, name: AngryCustomerSurge }
  - { timestep: 25, name: RefundPolicyChange }
  - { timestep: 30, name: RefundPolicyChange }
  - { timestep: 35, name: AngryCustomerSurge }
  - { timestep: 40, name: RefundPolicyChange }

stochastic:
  - { name: AngryCustomerSurge, probability: 0.06 }
